services:
  captcha-bypass:
    build:
      context: .
      dockerfile: Dockerfile
    image: captcha-bypass:local
    container_name: captcha-bypass
    ports:
      - '7788:7788'
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./data/.env:/app/.env
      - ./data/logs:/app/logs
      - ./data/models:/app/models
      - ./data/public:/app/public
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:7788/health || exit 1']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s
