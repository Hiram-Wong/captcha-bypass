name: Docker

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.value }}
      version: ${{ steps.tag.outputs.version }}
      image: ${{ steps.info.outputs.image }}
      package: ${{ steps.info.outputs.package }}
      description: ${{ steps.info.outputs.description }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Resolve image info
        id: info
        shell: bash
        run: |
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          PACKAGE="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          DESC="$(jq -r '.description' package.json)"
          echo "image=ghcr.io/${OWNER}/${PACKAGE}" >> "$GITHUB_OUTPUT"
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "description=$DESC" >> "$GITHUB_OUTPUT"

  cleanup:
    needs: meta
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}

    steps:
      - name: Calculate cutoff time
        id: cleanup
        run: |
          echo "cutoff_ts=$(date -u -d '7 days ago' +%s)" >> "$GITHUB_OUTPUT"

      - name: Clean up stale caches
        run: |
          CUTOFF=${{ steps.cleanup.outputs.cutoff_ts }}

          gh api "repos/$REPO/actions/caches" --paginate \
            --jq "
              .actions_caches[]
              | select(
                  (.key | startswith(\"buildkit-blob\"))
                  or (.key | endswith(\"docker.io-\"))
                  or (.key | endswith(\"index-buildkit-\"))
                )
              | select(
                  (
                    .created_at[0:19] + \"Z\"
                    | fromdateiso8601
                  ) < $CUTOFF
                )
              | .id
            " |
          xargs -r -I {} sh -c '
            echo "Deleting cache {}"
            gh api "repos/$REPO/actions/caches/{}" -X DELETE || true
          '

      - name: Clean up stale artifacts
        run: |
          CUTOFF=${{ steps.cleanup.outputs.cutoff_ts }}

          gh api "repos/$REPO/actions/artifacts" --paginate \
            --jq "
              .artifacts[]
              | select(.name | endswith(\".dockerbuild\"))
              | select((.created_at | fromdateiso8601) < $CUTOFF)
              | .id
            " |
          xargs -r -I {} sh -c '
            echo "Deleting artifact {}"
            gh api "repos/$REPO/actions/artifacts/{}" -X DELETE || true
          '

  build-push:
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ needs.meta.outputs.image }}:${{ needs.meta.outputs.tag }}
            ${{ needs.meta.outputs.image }}:latest
          annotations: |
            index:org.opencontainers.image.title=${{ needs.meta.outputs.package }}
            index:org.opencontainers.image.description=${{ needs.meta.outputs.description }}
            index:org.opencontainers.image.version=${{ needs.meta.outputs.version }}
            index:org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: |
            type=gha,scope=buildkit-main
            type=gha,scope=${{ github.ref_name }}
          cache-to: type=gha,mode=min,scope=buildkit-main
